spring.application.name=mixmaster-backend
spring.config.import=optional:file:.env[.properties]
spring.profiles.default=local

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8080}
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.tomcat.accesslog.enabled=${SERVER_TOMCAT_ACCESSLOG_ENABLED:true}
server.tomcat.accesslog.pattern=${SERVER_TOMCAT_ACCESSLOG_PATTERN:%a "%r" %s %b %D}

spring.jackson.time-zone=America/Santiago

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mixmaster?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:mixmaster}
spring.datasource.password=${DB_PASSWORD:mixmaster}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${HIBERNATE_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=America/Santiago
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT_MS:3000}
spring.cache.type=${SPRING_CACHE_TYPE:simple}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}
logging.level.com.mixmaster.platform=${LOG_LEVEL_APP:INFO}

mixmaster.tenant.header-name=${MIXMASTER_TENANT_HEADER:X-Tenant-Key}
mixmaster.tenant.brand-header-name=${MIXMASTER_BRAND_HEADER:X-Brand-Key}
mixmaster.tenant.branch-header-name=${MIXMASTER_BRANCH_HEADER:X-Branch-Key}

mixmaster.cors.allowed-origin-patterns[0]=${MIXMASTER_CORS_ORIGIN_0:http://localhost:4200}
mixmaster.cors.allowed-origin-patterns[1]=${MIXMASTER_CORS_ORIGIN_1:http://localhost:4201}
mixmaster.cors.allowed-origin-patterns[2]=${MIXMASTER_CORS_ORIGIN_2:http://localhost:4202}
mixmaster.cors.allowed-origin-patterns[3]=${MIXMASTER_CORS_ORIGIN_3:http://localhost:4300}

mixmaster.security.bootstrap.enabled=${MIXMASTER_BOOTSTRAP_ENABLED:false}
mixmaster.security.bootstrap.consumer-username=${MIXMASTER_BOOTSTRAP_CONSUMER_USERNAME:consumer@local}
mixmaster.security.bootstrap.consumer-password=${MIXMASTER_BOOTSTRAP_CONSUMER_PASSWORD:consumer-local}
mixmaster.security.bootstrap.tenant-username=${MIXMASTER_BOOTSTRAP_TENANT_USERNAME:tenant@local}
mixmaster.security.bootstrap.tenant-password=${MIXMASTER_BOOTSTRAP_TENANT_PASSWORD:tenant-local}
mixmaster.security.bootstrap.platform-username=${MIXMASTER_BOOTSTRAP_PLATFORM_USERNAME:platform@local}
mixmaster.security.bootstrap.platform-password=${MIXMASTER_BOOTSTRAP_PLATFORM_PASSWORD:platform-local}
mixmaster.security.token.enabled=${MIXMASTER_TOKEN_ENABLED:false}
mixmaster.security.token.issuer=${MIXMASTER_TOKEN_ISSUER:mixmaster.local}
mixmaster.security.token.access-ttl=${MIXMASTER_TOKEN_ACCESS_TTL:PT15M}
mixmaster.security.token.refresh-ttl=${MIXMASTER_TOKEN_REFRESH_TTL:P30D}

mixmaster.rate-limit.enabled=${MIXMASTER_RATE_LIMIT_ENABLED:true}
mixmaster.rate-limit.login-per-minute=${MIXMASTER_RATE_LIMIT_LOGIN_PER_MINUTE:20}
mixmaster.rate-limit.write-per-minute=${MIXMASTER_RATE_LIMIT_WRITE_PER_MINUTE:120}
mixmaster.rate-limit.status-per-minute=${MIXMASTER_RATE_LIMIT_STATUS_PER_MINUTE:240}

mixmaster.audit.enabled=${MIXMASTER_AUDIT_ENABLED:true}
