spring.application.name=mixmaster-backend
spring.profiles.default=local
spring.config.import=optional:file:.env[.properties]

server.address=0.0.0.0
server.port=${SERVER_PORT:8080}
server.error.include-message=never

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

info.application.name=MixMaster Platform
info.application.architecture=modular-monolith
info.application.multitenancy=shared-schema

spring.datasource.url=${MIXMASTER_DB_URL:jdbc:mysql://localhost:3306/mixmaster?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MIXMASTER_DB_USERNAME:mixmaster}
spring.datasource.password=${MIXMASTER_DB_PASSWORD:mixmaster}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${MIXMASTER_REDIS_HOST:localhost}
spring.data.redis.port=${MIXMASTER_REDIS_PORT:6379}
spring.data.redis.password=${MIXMASTER_REDIS_PASSWORD:}
spring.data.redis.timeout=2s
spring.cache.type=redis

mixmaster.tenant.header-name=${MIXMASTER_TENANT_HEADER:X-Tenant-Key}
mixmaster.tenant.brand-header-name=${MIXMASTER_BRAND_HEADER:X-Brand-Key}
mixmaster.tenant.branch-header-name=${MIXMASTER_BRANCH_HEADER:X-Branch-Key}

mixmaster.cors.allowed-origin-patterns[0]=http://localhost:4200
mixmaster.cors.allowed-origin-patterns[1]=http://localhost:4300
mixmaster.cors.allowed-origin-patterns[2]=http://localhost:4400

mixmaster.security.bootstrap.enabled=${MIXMASTER_BOOTSTRAP_SECURITY_ENABLED:false}
mixmaster.security.bootstrap.consumer-username=${MIXMASTER_CONSUMER_BOOTSTRAP_USERNAME:consumer.local}
mixmaster.security.bootstrap.consumer-password=${MIXMASTER_CONSUMER_BOOTSTRAP_PASSWORD:change-me}
mixmaster.security.bootstrap.tenant-username=${MIXMASTER_TENANT_BOOTSTRAP_USERNAME:tenant.local}
mixmaster.security.bootstrap.tenant-password=${MIXMASTER_TENANT_BOOTSTRAP_PASSWORD:change-me}
mixmaster.security.bootstrap.platform-username=${MIXMASTER_PLATFORM_BOOTSTRAP_USERNAME:platform.local}
mixmaster.security.bootstrap.platform-password=${MIXMASTER_PLATFORM_BOOTSTRAP_PASSWORD:change-me}

mixmaster.ratelimit.enabled=${MIXMASTER_RATELIMIT_ENABLED:true}
mixmaster.ratelimit.login-per-minute=${MIXMASTER_RATELIMIT_LOGIN_PER_MINUTE:20}
mixmaster.ratelimit.write-per-minute=${MIXMASTER_RATELIMIT_WRITE_PER_MINUTE:120}
mixmaster.ratelimit.status-per-minute=${MIXMASTER_RATELIMIT_STATUS_PER_MINUTE:240}

mixmaster.audit.enabled=${MIXMASTER_AUDIT_ENABLED:true}
