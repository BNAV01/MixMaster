# Dev-only overrides. Enable via: SPRING_PROFILES_ACTIVE=dev

server.error.include-message=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.mixmaster.platform=DEBUG
logging.level.org.springframework.security=DEBUG

mixmaster.security.bootstrap.enabled=true
mixmaster.ratelimit.status-per-minute=480
mixmaster.ratelimit.write-per-minute=240
