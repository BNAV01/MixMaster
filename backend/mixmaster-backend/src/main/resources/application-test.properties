spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration,org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
spring.cache.type=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.com.mixmaster.platform=INFO
logging.level.org.springframework.security=WARN

mixmaster.security.bootstrap.enabled=false
