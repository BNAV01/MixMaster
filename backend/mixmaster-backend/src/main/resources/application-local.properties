# Local profile used by default for day-to-day development.

server.error.include-message=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.mixmaster.platform=DEBUG

mixmaster.security.bootstrap.enabled=true
mixmaster.security.bootstrap.consumer-username=consumer@local
mixmaster.security.bootstrap.consumer-password=consumer-local
mixmaster.security.bootstrap.tenant-username=tenant@local
mixmaster.security.bootstrap.tenant-password=tenant-local
mixmaster.security.bootstrap.platform-username=platform@local
mixmaster.security.bootstrap.platform-password=platform-local
